name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-hono
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend-hono/package-lock.json
      - run: npm ci
      - run: npm run db:migrate:test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          PB_TRACKER_DATABASE_ROLE: destructive-test
          PB_TRACKER_EXPECTED_PROJECT_ID: dry-tooth-70023755
          PB_TRACKER_EXPECTED_BRANCH_ID: br-soft-field-afjdtpjs
      - run: npm run typecheck
      - run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          PB_TRACKER_DATABASE_ROLE: destructive-test
          PB_TRACKER_EXPECTED_PROJECT_ID: dry-tooth-70023755
          PB_TRACKER_EXPECTED_BRANCH_ID: br-soft-field-afjdtpjs

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
