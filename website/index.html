<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OSRS PB Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1><span class="accent">PB</span> Tracker</h1>
      <p class="subtitle">Old School RuneScape boss personal best records</p>
    </div>
  </header>

  <main class="wrap">
    <section class="search-card">
      <form id="search-form" autocomplete="off">
        <input id="search-input" type="text" placeholder="Look up a player, e.g. Blitzen" />
        <button type="submit">Search</button>
      </form>
      <div id="search-suggestions" class="suggestions"></div>
    </section>

    <section class="boss-select-card">
      <label for="boss-search">Or browse a leaderboard</label>
      <div class="combobox" id="boss-combobox">
        <button type="button" id="boss-search" class="combobox-trigger">
          <span id="boss-search-label" class="placeholder">Select a boss...</span>
          <svg class="combobox-chevron" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="combobox-panel" id="boss-panel">
          <div class="combobox-search">
            <svg class="combobox-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input type="text" id="boss-filter" class="combobox-filter" placeholder="Search bosses..." autocomplete="off" />
          </div>
          <div id="boss-options" class="combobox-options"></div>
        </div>
      </div>
    </section>

    <section id="results"></section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      Data synced from the <strong>PB Tracker Sync</strong> RuneLite plugin.
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
